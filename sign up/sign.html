<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link
      rel="stylesheet"
      href="sign.css" />

   <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link
      rel="stylesheet"
      href="../css/bootstrap.min.css" />
    <link
      rel="stylesheet"
      href="../css/bootstrap.min.css.map" />
</head>
<body>

<!--       sign   up     -->
<section class="login d-flex justify-content-center align-items-center position-absolute">

  <div class="sign d-flex flex-column p-3">

    <div class="title p-2">
        <h2 class="fs-2 fw-semibold mb-2">Asseel</h2>
        <p class="fs-6 fw-light">A community for horse lovers and equestrian enthusiasts.</p>
    </div>

    <div class="form">
        <form id="loginForm" class="d-flex flex-column p-2">
            <label for="email" class="fs-5 fw-medium my-2 ms-2">Email </label>
            <input type="email" id="email" placeholder="Your email" required>

            <label for="password" class="fs-5 fw-medium my-2 ms-2">Password</label>
            <input type="password" name="password" id="passwoed" placeholder="Your password" required>

            <a href="" class="text-decoration-none "> <p class="fs-6 fw-light p-1 ms-2">Forgot your password ?</p> </a> 
            <button class="btn  fw-medium">sign in</button>
        </form>
        

    </div>
  
    <div class="another-way d-flex flex-column align-items-center">
        <p class="fs-6 fw-medium my-1 ms-2">Or continue with</p>

        <div class="icon my-2">
            <a href=""><img src="facebook.png" alt=""></a>
            <a href=""><img src="search.png" alt=""></a>
            <a href=""><img src="instagram.png" alt=""></a>
        </div>

        <p class="fs-6 fw-light mt-2">Don't have an account? <a href="#" onclick="goToSignup()" class="text-decoration-none fs-6 fw-light">Sign Up</a></p>

      </div>

 </div>





</section>



   <script src="../script.js"></script>
   <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // منع إعادة تحميل الصفحة الافتراضي للـ form
            
            // حفظ حالة تسجيل الدخول في المتصفح
            localStorage.setItem("isLoggedIn", "true");
            
            // توجيه المستخدم لصفحة الهوم بنجاح
            window.location.href = "../index.html";
        });
    </script>

  
</body>
</html>
