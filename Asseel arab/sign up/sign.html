<!--       sign   up     -->
<section class="login d-flex justify-content-center align-items-center position-absolute">

  <div class="sign d-flex flex-column p-3">

    <div class="title p-2">
        <h2 class="fs-2 fw-semibold mb-2">أصيل</h2>
        <p class="fs-6 fw-light">مجتمع لمحبّي الخيول وعشاق الفروسية.</p>
    </div>

    <div class="form">
        <form action="../index.html" class="d-flex flex-column p-2">
            <label for="email" class="fs-5 fw-medium my-2 ms-2">البريد الإلكتروني </label>
            <input type="email" id="email" placeholder="Your email" required>

            <label for="password" class="fs-5 fw-medium my-2 ms-2">كلمة المرور</label>
            <input type="password" name="password" id="passwoed" placeholder="Your password" required>

            <a href="" class="text-decoration-none "> <p class="fs-6 fw-light p-1 ms-2">نسيت كلمة المرور؟</p> </a> 
            <button class="btn  fw-medium">تسجيل الدخول</button>
        </form>
        

    </div>
  
    <div class="another-way d-flex flex-column align-items-center">
        <p class="fs-6 fw-medium my-1 ms-2">أو تابع باستخدام</p>

        <div class="icon my-2">
            <a href=""><img src="facebook.png" alt=""></a>
            <a href=""><img src="search.png" alt=""></a>
            <a href=""><img src="instagram.png" alt=""></a>
        </div>

        <p class="fs-6 fw-light mt-2">ليس لديك حساب؟ <a href="" class="text-decoration-none fs-6 fw-light">إنشاء حساب</a></p>

      </div>

 </div>





</section>
